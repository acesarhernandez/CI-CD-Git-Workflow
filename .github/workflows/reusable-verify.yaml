name: Reusable Verify

on:
  workflow_call:
    inputs:
      release_manifest_artifact_name:
        description: Name of the uploaded release manifest artifact
        required: false
        type: string
        default: ""

      release_manifest_path:
        description: Path to the release manifest JSON file
        required: false
        type: string
        default: ""

      target_environment:
        description: Target environment being verified
        required: true
        type: string

    outputs:
      verification_passed:
        description: Whether verification passed
        value: ${{ jobs.verify.outputs.verification_passed }}

      verification_error_count:
        description: Number of verification errors
        value: ${{ jobs.verify.outputs.verification_error_count }}

      verification_report_path:
        description: Path to the verification report
        value: ${{ jobs.verify.outputs.verification_report_path }}

      resolved_manifest_path:
        description: Resolved manifest path used for verification
        value: ${{ jobs.verify.outputs.resolved_manifest_path }}

jobs:
  verify:
    name: Verify
    runs-on: self-hosted
    environment: ${{ inputs.target_environment }}

    outputs:
      verification_passed: ${{ steps.verify.outputs.verification_passed }}
      verification_error_count: ${{ steps.verify.outputs.verification_error_count }}
      verification_report_path: ${{ steps.verify.outputs.verification_report_path }}
      resolved_manifest_path: ${{ steps.resolve_manifest.outputs.manifest_path }}

    steps:
      - name: Validate manifest input mode
        shell: bash
        run: |
          artifact_name="${{ inputs.release_manifest_artifact_name }}"
          manifest_path="${{ inputs.release_manifest_path }}"

          if [[ -n "$artifact_name" && -n "$manifest_path" ]]; then
            echo "Provide either release_manifest_artifact_name or release_manifest_path, not both." >&2
            exit 1
          fi

          if [[ -z "$artifact_name" && -z "$manifest_path" ]]; then
            echo "You must provide release_manifest_artifact_name or release_manifest_path." >&2
            exit 1
          fi

      - name: Checkout caller repository
        uses: actions/checkout@v4

      - name: Checkout CI/CD system repository
        uses: actions/checkout@v4
        with:
          repository: acesarhernandez/CI-CD-Git-Workflow
          ref: main
          path: .cicd-system

      - name: Download release manifest artifact
        if: ${{ inputs.release_manifest_artifact_name != '' }}
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.release_manifest_artifact_name }}
          path: verify-manifest

      - name: Resolve manifest path
        id: resolve_manifest
        shell: bash
        run: |
          if [[ -n "${{ inputs.release_manifest_artifact_name }}" ]]; then
            manifest_file=$(find verify-manifest -maxdepth 1 -name '*.json' | head -n 1)
            if [[ -z "$manifest_file" ]]; then
              echo "No manifest JSON file found in downloaded artifact." >&2
              exit 1
            fi
            echo "manifest_path=$manifest_file" >> "$GITHUB_OUTPUT"
          else
            manifest_path="${{ inputs.release_manifest_path }}"
            if [[ ! -f "$manifest_path" ]]; then
              echo "Manifest path does not exist: $manifest_path" >&2
              exit 1
            fi
            echo "manifest_path=$manifest_path" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Run verification
        id: verify
        shell: bash
        run: |
          python3 '.cicd-system/verify_release.py' \
            '${{ steps.resolve_manifest.outputs.manifest_path }}' \
            '${{ inputs.target_environment }}'

      - name: Upload verification report
        uses: actions/upload-artifact@v4
        with:
          name: verification-report-${{ inputs.target_environment }}
          path: ${{ steps.verify.outputs.verification_report_path }}

      - name: Verification summary
        shell: bash
        run: |
          {
            echo "## Verification Summary"
            echo ""
            echo "- Environment: ${{ inputs.target_environment }}"
            echo "- Passed: ${{ steps.verify.outputs.verification_passed }}"
            echo "- Error count: ${{ steps.verify.outputs.verification_error_count }}"
            echo "- Report: ${{ steps.verify.outputs.verification_report_path }}"
            echo "- Manifest Path: ${{ steps.resolve_manifest.outputs.manifest_path }}"
          } >> "$GITHUB_STEP_SUMMARY"
